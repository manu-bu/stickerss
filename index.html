<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Idiomas Zero</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f1ed;
        }

        /* PANTALLA DE INICIO */
        #pantalla-inicio {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            background: #f5f1ed;
        }

        .titulo {
            font-size: 48px;
            color: #8b7355;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .controles {
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        .selector {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-start;
        }

        .selector label {
            font-size: 16px;
            color: #6b5a4a;
            font-weight: 500;
        }

        .selector select {
            padding: 10px 14px;
            font-size: 14px;
            border: 2.5px solid #d4c5b8;
            border-radius: 8px;
            background: #f9f5f0;
            color: #6b5a4a;
            cursor: pointer;
            min-width: 220px;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b5a4a' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 18px;
            padding-right: 36px;
        }

        #btn-jugar {
            padding: 12px 36px;
            font-size: 18px;
            background: #f9f5f0;
            color: #6b5a4a;
            border: 2.5px solid #d4c5b8;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            margin-top: 12px;
        }

        #btn-jugar:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* PANTALLA DE JUEGO */
        #pantalla-juego {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            background-image: url('./images/fondo.png');
            background-position: center;
            background-size: cover;
            position: relative;
        }

        .barra-superior {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            gap: 16px;
            background: rgba(255, 255, 255, 0.95);
        }

        .barra-superior button {
            padding: 10px 18px;
            font-size: 13px;
            background: #f9f5f0;
            color: #6b5a4a;
            border: 2.5px solid #d4c5b8;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.15s ease;
        }

        .barra-superior button:active {
            opacity: 0.8;
        }

        .espacio-barra { flex: 1; }

        .contenedor-juego {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px 20px 12px 20px;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .cartelito {
            background: #f9f5f0;
            border: 2.5px solid #d4c5b8;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 22px;
            color: #6b5a4a;
            text-align: center;
            font-weight: 500;
            max-width: 80%;
            margin: 0 auto;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .cartelito:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        .grid-contenedor {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 8px;
            position: relative;
        }

        .celda-drop {
            grid-column: 1 / 3;
            grid-row: 4;
            background: transparent;
            border: 2px dashed rgba(212, 197, 184, 0.2);
            border-radius: 6px;
        }

        .item {
            position: absolute;
            width: 140px;
            height: 140px;
            background: transparent;
            border: none;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            z-index: 10;
            padding: 0;
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .item.dragging {
            opacity: 0.85;
            z-index: 100;
        }

        .item.error {
            animation: parpadeo 0.4s ease;
        }

        @keyframes parpadeo {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* COUNTDOWN */
        .countdown {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            color: #8b7355;
            font-weight: bold;
            z-index: 1000;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        /* PAUSA */
        #panel-pausa {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }

        .contenido-pausa {
            background: #f9f5f0;
            border: 2.5px solid #d4c5b8;
            border-radius: 8px;
            padding: 40px 50px;
            text-align: center;
            min-width: 320px;
        }

        .contenido-pausa div {
            font-size: 40px;
            color: #6b5a4a;
            font-weight: 500;
            margin-bottom: 24px;
        }

        .contenido-pausa button {
            padding: 12px 32px;
            font-size: 16px;
            background: #f9f5f0;
            color: #6b5a4a;
            border: 2.5px solid #d4c5b8;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        /* GLITTER PARTICLES */
        .glitter {
            position: fixed;
            pointer-events: none;
            font-size: 12px;
            opacity: 0.8;
        }

        @keyframes flotar-glitter {
            0% {
                opacity: 0.8;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        .glitter {
            animation: flotar-glitter 1.2s ease-out forwards;
        }
    </style>
</head>
<body>
    <!-- PANTALLA DE INICIO -->
    <div id="pantalla-inicio">
        <div class="titulo">Idiomas Zero</div>
        <div class="controles">
            <div class="selector">
                <label for="idioma">Idioma</label>
                <select id="idioma">
                    <option value="">Selecciona un idioma</option>
                    <option value="ingles">Inglés</option>
                    <option value="frances">Francés</option>
                </select>
            </div>
            <div class="selector">
                <label for="tema">Tema</label>
                <select id="tema">
                    <option value="">Selecciona un tema</option>
                    <option value="comida">Comida</option>
                    <option value="bano">Baño</option>
                </select>
            </div>
            <button id="btn-jugar" disabled>Jugar</button>
        </div>
    </div>

    <!-- PANTALLA DE JUEGO -->
    <div id="pantalla-juego">
        <div class="barra-superior">
            <button id="btn-inicio">Inicio</button>
            <div class="espacio-barra"></div>
            <button id="btn-pausa">Pausa</button>
        </div>
        <div class="contenedor-juego">
            <div class="cartelito" id="cartelito"></div>
            <div class="grid-contenedor" id="grid">
                <div class="celda-drop" id="zona-drop"></div>
            </div>
        </div>
    </div>

    <!-- PANEL DE PAUSA -->
    <div id="panel-pausa">
        <div class="contenido-pausa">
            <div>Pausa</div>
            <button id="btn-reanudar">Continuar</button>
        </div>
    </div>

    <script>
        // VOCABULARIO
        const vocab = {
            comida: {
                ingles: [
                    { key: 'pan', palabra: 'Bread', articulo: 'The' },
                    { key: 'huevo', palabra: 'Egg', articulo: 'The' },
                    { key: 'leche', palabra: 'Milk', articulo: '' },
                    { key: 'cereales', palabra: 'Cereal', articulo: 'The' },
                    { key: 'chocolate', palabra: 'Chocolate', articulo: '' }
                ],
                frances: [
                    { key: 'pan', palabra: 'Pain', articulo: 'Le' },
                    { key: 'huevo', palabra: 'Oeuf', articulo: "L'" },
                    { key: 'leche', palabra: 'Lait', articulo: 'Le' },
                    { key: 'cereales', palabra: 'Céréales', articulo: 'Les' },
                    { key: 'chocolate', palabra: 'Chocolat', articulo: 'Le' }
                ]
            },
            bano: {
                ingles: [
                    { key: 'alfombra', palabra: 'Mat', articulo: 'The' },
                    { key: 'shampoo', palabra: 'Shampoo', articulo: '' },
                    { key: 'bata', palabra: 'Robe', articulo: 'The' },
                    { key: 'pantuflas', palabra: 'Slippers', articulo: '' },
                    { key: 'cortina', palabra: 'Curtain', articulo: 'The' }
                ],
                frances: [
                    { key: 'alfombra', palabra: 'Tapis', articulo: 'Le' },
                    { key: 'shampoo', palabra: 'Shampoing', articulo: 'Le' },
                    { key: 'bata', palabra: 'Peignoir', articulo: 'Le' },
                    { key: 'pantuflas', palabra: 'Pantoufles', articulo: 'Les' },
                    { key: 'cortina', palabra: 'Rideau', articulo: 'Le' }
                ]
            }
        };

        // ESTADO
        let estado = {
            idioma: null,
            tema: null,
            enJuego: false,
            pausado: false,
            items: [],
            itemActual: null,
            puntuacion: 0
        };

        // DOM
        const selIdioma = document.getElementById('idioma');
        const selTema = document.getElementById('tema');
        const btnJugar = document.getElementById('btn-jugar');
        const pantInicio = document.getElementById('pantalla-inicio');
        const pantJuego = document.getElementById('pantalla-juego');
        const btnInicio = document.getElementById('btn-inicio');
        const btnPausa = document.getElementById('btn-pausa');
        const panelPausa = document.getElementById('panel-pausa');
        const btnReanudar = document.getElementById('btn-reanudar');
        const cartelito = document.getElementById('cartelito');
        const grid = document.getElementById('grid');

        // EVENTOS INICIO
        selIdioma.addEventListener('change', validar);
        selTema.addEventListener('change', validar);
        btnJugar.addEventListener('click', iniciar);
        btnInicio.addEventListener('click', volverInicio);
        btnPausa.addEventListener('click', pausar);
        btnReanudar.addEventListener('click', reanudar);
        cartelito.addEventListener('click', reproducirAudio);

        function validar() {
            btnJugar.disabled = !selIdioma.value || !selTema.value;
        }

        async function iniciar() {
            estado.idioma = selIdioma.value;
            estado.tema = selTema.value;
            estado.enJuego = true;
            estado.pausado = false;
            pantInicio.style.display = 'none';
            pantJuego.style.display = 'flex';
            
            await countdown();
            setup();
        }

        function countdown() {
            return new Promise(resolve => {
                let n = 3;
                const div = document.createElement('div');
                div.className = 'countdown';
                document.body.appendChild(div);
                
                const timer = setInterval(() => {
                    div.textContent = n;
                    n--;
                    if (n < 0) {
                        clearInterval(timer);
                        div.remove();
                        resolve();
                    }
                }, 1000);
            });
        }

        function setup() {
            grid.innerHTML = '<div class="celda-drop" id="zona-drop"></div>';
            
            const items_vocab = vocab[estado.tema][estado.idioma];
            estado.items = items_vocab.map(item => ({
                ...item,
                displayText: item.articulo ? `${item.articulo} ${item.palabra}` : item.palabra
            }));

            colocarItems();
            proximoItem();
        }

        function colocarItems() {
            const gridRect = grid.getBoundingClientRect();
            
            estado.items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.dataset.key = item.key;
                
                const img = document.createElement('img');
                img.src = `./images/${estado.tema}/${item.key}.png`;
                div.appendChild(img);
                
                const x = Math.random() * (gridRect.width - 140);
                const y = Math.random() * (gridRect.height - 140);
                div.style.left = x + 'px';
                div.style.top = y + 'px';
                
                div.addEventListener('touchstart', dragStart, false);
                div.addEventListener('touchmove', dragMove, false);
                div.addEventListener('touchend', dragEnd, false);
                
                grid.appendChild(div);
            });
        }

        function proximoItem() {
            const random = Math.floor(Math.random() * estado.items.length);
            estado.itemActual = estado.items[random];
            cartelito.textContent = estado.itemActual.displayText;
        }

        // DRAG & DROP CON TOUCH
        let dragging = null;
        let dragOffset = { x: 0, y: 0 };

        function dragStart(e) {
            if (estado.pausado) return;
            dragging = e.target.closest('.item');
            if (!dragging) return;
            
            dragging.classList.add('dragging');
            const touch = e.touches[0];
            const rect = dragging.getBoundingClientRect();
            dragOffset.x = touch.clientX - rect.left;
            dragOffset.y = touch.clientY - rect.top;
        }

        function dragMove(e) {
            if (!dragging || estado.pausado) return;
            e.preventDefault();
            
            const touch = e.touches[0];
            const gridRect = grid.getBoundingClientRect();
            
            let x = touch.clientX - gridRect.left - dragOffset.x;
            let y = touch.clientY - gridRect.top - dragOffset.y;
            
            x = Math.max(0, Math.min(x, gridRect.width - 140));
            y = Math.max(0, Math.min(y, gridRect.height - 140));
            
            dragging.style.left = x + 'px';
            dragging.style.top = y + 'px';
        }

        function dragEnd(e) {
            if (!dragging) return;
            
            const zonaDrop = document.getElementById('zona-drop');
            const dropRect = zonaDrop.getBoundingClientRect();
            const itemRect = dragging.getBoundingClientRect();
            
            const enZona = !(itemRect.right < dropRect.left || 
                            itemRect.left > dropRect.right || 
                            itemRect.bottom < dropRect.top || 
                            itemRect.top > dropRect.bottom);
            
            if (enZona && dragging.dataset.key === estado.itemActual.key) {
                // CORRECTO
                crearGlitter(itemRect);
                dragging.style.display = 'none';
                estado.puntuacion++;
                proximoItem();
            } else if (enZona) {
                // INCORRECTO - parpadeo
                dragging.classList.add('error');
                setTimeout(() => dragging.classList.remove('error'), 400);
            }
            
            dragging.classList.remove('dragging');
            dragging = null;
        }

        function crearGlitter(rect) {
            const cantidad = 12;
            for (let i = 0; i < cantidad; i++) {
                const g = document.createElement('div');
                g.className = 'glitter';
                g.textContent = '•';
                g.style.left = (rect.left + rect.width / 2) + 'px';
                g.style.top = (rect.top + rect.height / 2) + 'px';
                g.style.color = '#d4a574';
                
                const angulo = (i / cantidad) * Math.PI * 2;
                const dist = 80 + Math.random() * 40;
                const tx = Math.cos(angulo) * dist;
                const ty = Math.sin(angulo) * dist;
                
                g.style.setProperty('--tx', tx + 'px');
                g.style.setProperty('--ty', ty + 'px');
                
                document.body.appendChild(g);
                setTimeout(() => g.remove(), 1200);
            }
        }

        function reproducirAudio() {
            if (!estado.itemActual) return;
            
            const utterance = new SpeechSynthesisUtterance(estado.itemActual.palabra);
            utterance.lang = estado.idioma === 'ingles' ? 'en-US' : 'fr-FR';
            utterance.rate = 0.8;
            
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        function volverInicio() {
            estado.enJuego = false;
            estado.pausado = false;
            panelPausa.style.display = 'none';
            pantJuego.style.display = 'none';
            pantInicio.style.display = 'flex';
            selIdioma.value = '';
            selTema.value = '';
            validar();
        }

        function pausar() {
            estado.pausado = true;
            panelPausa.style.display = 'flex';
        }

        function reanudar() {
            estado.pausado = false;
            panelPausa.style.display = 'none';
        }
    </script>
</body>
</html>
