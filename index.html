<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>STICKERS!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --font: 'Quicksand', 'Nunito', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        }
        
        html, body {
            font-family: var(--font);
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #f5f1ed;
        }

        * {
            font-family: var(--font);
        }

        #pantalla-inicio {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            background: #f5f1ed;
        }

        .titulo {
            font-size: 48px;
            color: #8b7355;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .controles {
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        .selector {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .selector label {
            font-size: 16px;
            color: #6b5a4a;
            font-weight: 500;
        }

        .opciones-fila {
            display: flex;
            gap: 12px;
        }

        .opcion-btn {
            padding: 10px 20px;
            font-size: 14px;
            border: 4px solid #d4c5b8;
            border-radius: 8px;
            background: #f9f5f0;
            color: #6b5a4a;
            cursor: pointer;
            font-weight: 400;
            transition: all 0.2s ease;
            font-family: var(--font-quicksand);
        }

        .opcion-btn:hover {
            background: #faf8f6;
        }

        .opcion-btn.selected {
            background: #d4c5b8;
            color: #fff;
            font-weight: 500;
        }

        #btn-jugar {
            padding: 12px 36px;
            font-size: 18px;
            background: #f9f5f0;
            color: #6b5a4a;
            border: 4px solid #d4c5b8;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
            margin-top: 12px;
            font-family: var(--font-quicksand);
        }

        #btn-jugar:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #pantalla-juego {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            background-image: url('./images/fondo.png');
            background-position: center;
            background-size: cover;
            position: relative;
        }

        .barra-superior {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            gap: 16px;
            background: rgba(245, 241, 237, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212, 197, 184, 0.3);
        }

        .barra-superior button {
            padding: 10px 18px;
            font-size: 13px;
            background: #f9f5f0;
            color: #6b5a4a;
            border: 4px solid #d4c5b8;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.15s ease;
            font-family: var(--font-quicksand);
        }

        .barra-superior button:active {
            opacity: 0.8;
        }

        .espacio-barra { flex: 1; }

        .contenedor-juego {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px 20px 12px 20px;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .cartelito {
            background: #f9f5f0;
            border: 4px solid #d4c5b8;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 22px;
            color: #6b5a4a;
            text-align: center;
            font-weight: 400;
            max-width: 80%;
            margin: 0 auto;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            font-family: var(--font-quicksand);
        }

        .cartelito:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        .grid-contenedor {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 8px;
            position: relative;
        }

        .celda-drop {
            grid-column: 1 / 3;
            grid-row: 4;
            background: transparent;
            border: 2px dashed rgba(212, 197, 184, 0.2);
            border-radius: 6px;
        }

        .item {
            position: absolute;
            width: 140px;
            height: 140px;
            background: transparent;
            border: none;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            z-index: 10;
            padding: 0;
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .item.dragging {
            opacity: 0.85;
            z-index: 100;
        }

        .item.error {
            animation: parpadeo 0.4s ease;
        }

        @keyframes parpadeo {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .countdown {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            color: #8b7355;
            font-weight: bold;
            z-index: 1000;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            font-family: var(--font-quicksand);
        }

        #panel-pausa {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }

        .contenido-pausa {
            background: #f9f5f0;
            border: 4px solid #d4c5b8;
            border-radius: 8px;
            padding: 40px 50px;
            text-align: center;
            min-width: 320px;
            font-family: var(--font-quicksand);
        }

        .contenido-pausa div {
            font-size: 40px;
            color: #6b5a4a;
            font-weight: 400;
            margin-bottom: 30px;
        }

        .contenido-pausa button {
            padding: 12px 32px;
            font-size: 16px;
            background: #f9f5f0;
            color: #6b5a4a;
            border: 4px solid #d4c5b8;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-family: var(--font-quicksand);
        }

        .glitter {
            position: fixed;
            pointer-events: none;
            font-size: 12px;
            opacity: 0.8;
        }

        @keyframes flotar-glitter {
            0% {
                opacity: 0.8;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        .glitter {
            animation: flotar-glitter 1.2s ease-out forwards;
        }

        .luciernaga {
            position: fixed;
            pointer-events: none;
            z-index: 5;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="pantalla-inicio">
        <div class="titulo">Stickers!</div>
        <div class="controles">
            <div class="selector">
                <label>Idioma</label>
                <div class="opciones-fila">
                    <button class="opcion-btn" data-idioma="ingles">Inglés</button>
                    <button class="opcion-btn" data-idioma="frances">Francés</button>
                    <button class="opcion-btn" data-idioma="italiano">Italiano</button>
                    <button class="opcion-btn" data-idioma="ruso">Ruso</button>
                    <button class="opcion-btn" data-idioma="aleman">Alemán</button>
                    <button class="opcion-btn" data-idioma="chino">Chino</button>
                    <button class="opcion-btn" data-idioma="portugues">Portugués</button>
                    <button class="opcion-btn" data-idioma="holandes">Holandés</button>
                </div>
            </div>
            <div class="selector">
                <label>Tema</label>
                <div class="opciones-fila">
                    <button class="opcion-btn" data-tema="comida">Comida</button>
                    <button class="opcion-btn" data-tema="bano">Baño</button>
                </div>
            </div>
            <button id="btn-jugar" disabled>Jugar</button>
        </div>
    </div>

    <div id="pantalla-juego">
        <div class="barra-superior">
            <button id="btn-inicio">Inicio</button>
            <div class="cartelito" id="cartelito"></div>
            <button id="btn-pausa">Pausa</button>
        </div>
        <div class="contenedor-juego">
            <div class="grid-contenedor" id="grid">
                <div class="celda-drop" id="zona-drop"></div>
            </div>
        </div>
    </div>

    <div id="panel-pausa">
        <div class="contenido-pausa">
            <div>Pausa</div>
            <button id="btn-reanudar">Continuar</button>
        </div>
    </div>

    <script>
        const vocab = {
            comida: {
                ingles: [
                    { key: 'pan', palabra: 'Bread', articulo: 'The', genero: 'neutro' },
                    { key: 'huevo', palabra: 'Egg', articulo: 'The', genero: 'neutro' },
                    { key: 'leche', palabra: 'Milk', articulo: '', genero: 'neutro' },
                    { key: 'cereales', palabra: 'Cereal', articulo: 'The', genero: 'neutro' },
                    { key: 'chocolate', palabra: 'Chocolate', articulo: '', genero: 'neutro' }
                ],
                frances: [
                    { key: 'pan', palabra: 'Pain', articulo: 'Le', genero: 'masculino' },
                    { key: 'huevo', palabra: 'Oeuf', articulo: "L'", genero: 'masculino' },
                    { key: 'leche', palabra: 'Lait', articulo: 'Le', genero: 'masculino' },
                    { key: 'cereales', palabra: 'Céréales', articulo: 'Les', genero: 'femenino' },
                    { key: 'chocolate', palabra: 'Chocolat', articulo: 'Le', genero: 'masculino' }
                ],
                italiano: [
                    { key: 'pan', palabra: 'Pane', articulo: 'Il', genero: 'masculino' },
                    { key: 'huevo', palabra: 'Uovo', articulo: "L'", genero: 'masculino' },
                    { key: 'leche', palabra: 'Latte', articulo: 'Il', genero: 'masculino' },
                    { key: 'cereales', palabra: 'Cereali', articulo: 'I', genero: 'plural' },
                    { key: 'chocolate', palabra: 'Cioccolato', articulo: 'Il', genero: 'masculino' }
                ],
                ruso: [
                    { key: 'pan', palabra: 'хлеб', articulo: '', genero: 'masculino' },
                    { key: 'huevo', palabra: 'яйцо', articulo: '', genero: 'neutro' },
                    { key: 'leche', palabra: 'молоко', articulo: '', genero: 'neutro' },
                    { key: 'cereales', palabra: 'зёрна', articulo: '', genero: 'plural' },
                    { key: 'chocolate', palabra: 'шоколад', articulo: '', genero: 'masculino' }
                ],
                aleman: [
                    { key: 'pan', palabra: 'Brot', articulo: 'Das', genero: 'neutro' },
                    { key: 'huevo', palabra: 'Ei', articulo: 'Das', genero: 'neutro' },
                    { key: 'leche', palabra: 'Milch', articulo: 'Die', genero: 'femenino' },
                    { key: 'cereales', palabra: 'Getreide', articulo: 'Das', genero: 'neutro' },
                    { key: 'chocolate', palabra: 'Schokolade', articulo: 'Die', genero: 'femenino' }
                ],
                chino: [
                    { key: 'pan', palabra: 'miànbāo', articulo: '', genero: 'neutro' },
                    { key: 'huevo', palabra: 'jīdàn', articulo: '', genero: 'neutro' },
                    { key: 'leche', palabra: 'niúnǎi', articulo: '', genero: 'neutro' },
                    { key: 'cereales', palabra: 'zhǔshíwù', articulo: '', genero: 'neutro' },
                    { key: 'chocolate', palabra: 'qiǎokèlì', articulo: '', genero: 'neutro' }
                ],
                portugues: [
                    { key: 'pan', palabra: 'Pão', articulo: 'O', genero: 'masculino' },
                    { key: 'huevo', palabra: 'Ovo', articulo: 'O', genero: 'masculino' },
                    { key: 'leche', palabra: 'Leite', articulo: 'O', genero: 'masculino' },
                    { key: 'cereales', palabra: 'Cereais', articulo: 'Os', genero: 'plural' },
                    { key: 'chocolate', palabra: 'Chocolate', articulo: 'O', genero: 'masculino' }
                ],
                holandes: [
                    { key: 'pan', palabra: 'Brood', articulo: 'Het', genero: 'neutro' },
                    { key: 'huevo', palabra: 'Ei', articulo: 'Het', genero: 'neutro' },
                    { key: 'leche', palabra: 'Melk', articulo: 'De', genero: 'femenino' },
                    { key: 'cereales', palabra: 'Granen', articulo: 'De', genero: 'plural' },
                    { key: 'chocolate', palabra: 'Chocolade', articulo: 'De', genero: 'femenino' }
                ]
            },
            bano: {
                ingles: [
                    { key: 'alfombra', palabra: 'Mat', articulo: 'The', genero: 'neutro' },
                    { key: 'shampoo', palabra: 'Shampoo', articulo: '', genero: 'neutro' },
                    { key: 'bata', palabra: 'Robe', articulo: 'The', genero: 'neutro' },
                    { key: 'pantuflas', palabra: 'Slippers', articulo: '', genero: 'plural' },
                    { key: 'cortina', palabra: 'Curtain', articulo: 'The', genero: 'neutro' }
                ],
                frances: [
                    { key: 'alfombra', palabra: 'Tapis', articulo: 'Le', genero: 'masculino' },
                    { key: 'shampoo', palabra: 'Shampoing', articulo: 'Le', genero: 'masculino' },
                    { key: 'bata', palabra: 'Peignoir', articulo: 'Le', genero: 'masculino' },
                    { key: 'pantuflas', palabra: 'Pantoufles', articulo: 'Les', genero: 'femenino' },
                    { key: 'cortina', palabra: 'Rideau', articulo: 'Le', genero: 'masculino' }
                ],
                italiano: [
                    { key: 'alfombra', palabra: 'Tappeto', articulo: 'Il', genero: 'masculino' },
                    { key: 'shampoo', palabra: 'Shampoo', articulo: 'Lo', genero: 'masculino' },
                    { key: 'bata', palabra: 'Accappatoio', articulo: "L'", genero: 'masculino' },
                    { key: 'pantuflas', palabra: 'Pantofole', articulo: 'Le', genero: 'femenino' },
                    { key: 'cortina', palabra: 'Tenda', articulo: 'La', genero: 'femenino' }
                ],
                ruso: [
                    { key: 'alfombra', palabra: 'коврик', articulo: '', genero: 'masculino' },
                    { key: 'shampoo', palabra: 'шампунь', articulo: '', genero: 'masculino' },
                    { key: 'bata', palabra: 'халат', articulo: '', genero: 'masculino' },
                    { key: 'pantuflas', palabra: 'тапочки', articulo: '', genero: 'plural' },
                    { key: 'cortina', palabra: 'штора', articulo: '', genero: 'femenino' }
                ],
                aleman: [
                    { key: 'alfombra', palabra: 'Matte', articulo: 'Die', genero: 'femenino' },
                    { key: 'shampoo', palabra: 'Shampoo', articulo: 'Das', genero: 'neutro' },
                    { key: 'bata', palabra: 'Bademantel', articulo: 'Der', genero: 'masculino' },
                    { key: 'pantuflas', palabra: 'Pantoffeln', articulo: 'Die', genero: 'femenino' },
                    { key: 'cortina', palabra: 'Vorhang', articulo: 'Der', genero: 'masculino' }
                ],
                chino: [
                    { key: 'alfombra', palabra: 'dìtǎn', articulo: '', genero: 'neutro' },
                    { key: 'shampoo', palabra: 'xǐfà shuǐ', articulo: '', genero: 'neutro' },
                    { key: 'bata', palabra: 'yùtàobāo', articulo: '', genero: 'neutro' },
                    { key: 'pantuflas', palabra: 'tuō xié', articulo: '', genero: 'neutro' },
                    { key: 'cortina', palabra: 'chuānglián', articulo: '', genero: 'neutro' }
                ],
                portugues: [
                    { key: 'alfombra', palabra: 'Tapete', articulo: 'O', genero: 'masculino' },
                    { key: 'shampoo', palabra: 'Shampoo', articulo: 'O', genero: 'masculino' },
                    { key: 'bata', palabra: 'Roupão', articulo: 'O', genero: 'masculino' },
                    { key: 'pantuflas', palabra: 'Chinelos', articulo: 'Os', genero: 'plural' },
                    { key: 'cortina', palabra: 'Cortina', articulo: 'A', genero: 'femenino' }
                ],
                holandes: [
                    { key: 'alfombra', palabra: 'Mat', articulo: 'De', genero: 'femenino' },
                    { key: 'shampoo', palabra: 'Shampoo', articulo: 'De', genero: 'femenino' },
                    { key: 'bata', palabra: 'Badjas', articulo: 'De', genero: 'femenino' },
                    { key: 'pantuflas', palabra: 'Slippers', articulo: 'De', genero: 'femenino' },
                    { key: 'cortina', palabra: 'Gordijn', articulo: 'Het', genero: 'neutro' }
                ]
            }
        };

        let estado = {
            idioma: null,
            tema: null,
            enJuego: false,
            pausado: false,
            items: [],
            itemActual: null,
            puntuacion: 0
        };

        const btnJugar = document.getElementById('btn-jugar');
        const pantInicio = document.getElementById('pantalla-inicio');
        const pantJuego = document.getElementById('pantalla-juego');
        const btnInicio = document.getElementById('btn-inicio');
        const btnPausa = document.getElementById('btn-pausa');
        const panelPausa = document.getElementById('panel-pausa');
        const btnReanudar = document.getElementById('btn-reanudar');
        const cartelito = document.getElementById('cartelito');
        const grid = document.getElementById('grid');

        const botonesIdioma = document.querySelectorAll('[data-idioma]');
        const botonesTema = document.querySelectorAll('[data-tema]');

        botonesIdioma.forEach(btn => {
            btn.addEventListener('click', () => {
                botonesIdioma.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                estado.idioma = btn.dataset.idioma;
                validar();
            });
        });

        botonesTema.forEach(btn => {
            btn.addEventListener('click', () => {
                botonesTema.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                estado.tema = btn.dataset.tema;
                validar();
            });
        });

        function validar() {
            btnJugar.disabled = !estado.idioma || !estado.tema;
        }

        btnJugar.addEventListener('click', iniciar);
        btnInicio.addEventListener('click', volverInicio);
        btnPausa.addEventListener('click', pausar);
        btnReanudar.addEventListener('click', reanudar);
        cartelito.addEventListener('click', reproducirAudio);

        window.addEventListener('load', crearLuciernagas);

        async function iniciar() {
            estado.enJuego = true;
            estado.pausado = false;
            pantInicio.style.display = 'none';
            pantJuego.style.display = 'flex';
            
            crearLuciernagas();
            
            await countdown();
            setup();
        }

        function countdown() {
            return new Promise(resolve => {
                let n = 3;
                const div = document.createElement('div');
                div.className = 'countdown';
                document.body.appendChild(div);
                
                const timer = setInterval(() => {
                    div.textContent = n;
                    n--;
                    if (n < 0) {
                        clearInterval(timer);
                        div.remove();
                        resolve();
                    }
                }, 1000);
            });
        }

        function setup() {
            grid.innerHTML = '<div class="celda-drop" id="zona-drop"></div>';
            
            const items_vocab = vocab[estado.tema][estado.idioma];
            estado.items = items_vocab.map(item => ({
                ...item,
                displayText: item.articulo ? `${item.articulo} ${item.palabra}` : item.palabra
            }));

            colocarItems();
            proximoItem();
        }

        function colocarItems() {
            const gridRect = grid.getBoundingClientRect();
            
            estado.items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.dataset.key = item.key;
                
                const img = document.createElement('img');
                img.src = `./images/${estado.tema}/${item.key}.png`;
                div.appendChild(img);
                
                const x = Math.random() * (gridRect.width - 140);
                const y = Math.random() * (gridRect.height - 140);
                div.style.left = x + 'px';
                div.style.top = y + 'px';
                
                div.addEventListener('touchstart', dragStart, false);
                div.addEventListener('touchmove', dragMove, false);
                div.addEventListener('touchend', dragEnd, false);
                
                grid.appendChild(div);
            });
        }

        function proximoItem() {
            const itemsDisponibles = estado.items.filter(item => {
                const element = document.querySelector(`[data-key="${item.key}"]`);
                return element && element.style.display !== 'none';
            });
            
            if (itemsDisponibles.length === 0) {
                cartelito.textContent = '¡Ganaste!';
                cartelito.style.borderColor = '#d4c5b8';
                return;
            }
            
            const random = Math.floor(Math.random() * itemsDisponibles.length);
            estado.itemActual = itemsDisponibles[random];
            cartelito.textContent = estado.itemActual.displayText;
            
            // Cambiar color del borde según género
            const colorPorGenero = {
                masculino: '#4da6ff',  // celeste
                femenino: '#ff69b4',   // rosa
                neutro: '#ffd700',     // amarillo
                plural: '#00cc66'      // verde
            };
            
            cartelito.style.borderColor = colorPorGenero[estado.itemActual.genero] || '#d4c5b8';
        }

        let dragging = null;
        let dragOffset = { x: 0, y: 0 };

        function dragStart(e) {
            if (estado.pausado) return;
            dragging = e.target.closest('.item');
            if (!dragging) return;
            
            dragging.classList.add('dragging');
            const touch = e.touches[0];
            const rect = dragging.getBoundingClientRect();
            dragOffset.x = touch.clientX - rect.left;
            dragOffset.y = touch.clientY - rect.top;
        }

        function dragMove(e) {
            if (!dragging || estado.pausado) return;
            e.preventDefault();
            
            const touch = e.touches[0];
            const gridRect = grid.getBoundingClientRect();
            
            let x = touch.clientX - gridRect.left - dragOffset.x;
            let y = touch.clientY - gridRect.top - dragOffset.y;
            
            x = Math.max(0, Math.min(x, gridRect.width - 140));
            y = Math.max(0, Math.min(y, gridRect.height - 140));
            
            dragging.style.left = x + 'px';
            dragging.style.top = y + 'px';
        }

        function dragEnd(e) {
            if (!dragging) return;
            
            const zonaDrop = document.getElementById('zona-drop');
            const dropRect = zonaDrop.getBoundingClientRect();
            const itemRect = dragging.getBoundingClientRect();
            
            const enZona = !(itemRect.right < dropRect.left || 
                            itemRect.left > dropRect.right || 
                            itemRect.bottom < dropRect.top || 
                            itemRect.top > dropRect.bottom);
            
            if (enZona && dragging.dataset.key === estado.itemActual.key) {
                crearGlitter(itemRect);
                dragging.style.display = 'none';
                estado.puntuacion++;
                proximoItem();
            } else if (enZona) {
                dragging.classList.add('error');
                setTimeout(() => dragging.classList.remove('error'), 400);
            }
            
            dragging.classList.remove('dragging');
            dragging = null;
        }

        function crearGlitter(rect) {
            const cantidad = 12;
            for (let i = 0; i < cantidad; i++) {
                const g = document.createElement('div');
                g.className = 'glitter';
                g.textContent = '•';
                g.style.left = (rect.left + rect.width / 2) + 'px';
                g.style.top = (rect.top + rect.height / 2) + 'px';
                g.style.color = '#d4a574';
                
                const angulo = (i / cantidad) * Math.PI * 2;
                const dist = 80 + Math.random() * 40;
                const tx = Math.cos(angulo) * dist;
                const ty = Math.sin(angulo) * dist;
                
                g.style.setProperty('--tx', tx + 'px');
                g.style.setProperty('--ty', ty + 'px');
                
                document.body.appendChild(g);
                setTimeout(() => g.remove(), 1200);
            }
        }

        function reproducirAudio() {
            if (!estado.itemActual) return;
            
            const utterance = new SpeechSynthesisUtterance(estado.itemActual.palabra);
            utterance.lang = estado.idioma === 'ingles' ? 'en-US' : 'fr-FR';
            utterance.rate = 0.8;
            
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        function volverInicio() {
            estado.enJuego = false;
            estado.pausado = false;
            estado.idioma = null;
            estado.tema = null;
            panelPausa.style.display = 'none';
            pantJuego.style.display = 'none';
            pantInicio.style.display = 'flex';
            botonesIdioma.forEach(b => b.classList.remove('selected'));
            botonesTema.forEach(b => b.classList.remove('selected'));
            validar();
        }

        function pausar() {
            estado.pausado = true;
            panelPausa.style.display = 'flex';
        }

        function reanudar() {
            estado.pausado = false;
            panelPausa.style.display = 'none';
        }

        function crearLuciernagas() {
            const cantidad = 20;
            for (let i = 0; i < cantidad; i++) {
                setTimeout(() => {
                    const luciernaga = document.createElement('div');
                    luciernaga.className = 'luciernaga';
                    
                    const isBlanca = i < 13;
                    const tamaño = isBlanca 
                        ? 16 + Math.random() * 8
                        : 2 + Math.random() * 4;
                    
                    const brillo = isBlanca 
                        ? 5 + Math.random() * 8
                        : 3 + Math.random() * 6;
                    
                    const startX = Math.random() * window.innerWidth;
                    const startY = Math.random() * window.innerHeight;
                    
                    const endX = Math.random() * window.innerWidth;
                    const endY = Math.random() * window.innerHeight;
                    
                    const midX = (startX + endX) / 2 + (Math.random() - 0.5) * 120;
                    const midY = (startY + endY) / 2 + (Math.random() - 0.5) * 120;
                    
                    const duracion = isBlanca 
                        ? 8000 + Math.random() * 6000 
                        : 12000 + Math.random() * 8000;
                    
                    const cicloTiempo = 4000 + Math.random() * 4000;
                    const tiempoEncendida = 2000 + Math.random() * 300;
                    
                    luciernaga.style.width = tamaño + 'px';
                    luciernaga.style.height = tamaño + 'px';
                    
                    if (isBlanca) {
                        luciernaga.style.background = `radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.5) 40%, rgba(255,255,255,0.1) 100%)`;
                        luciernaga.style.boxShadow = `0 0 ${brillo * 1.5}px rgba(255,255,255,0.4)`;
                    } else {
                        luciernaga.style.background = 'rgba(210, 180, 140, 0.9)';
                        luciernaga.style.boxShadow = `0 0 ${brillo}px rgba(210, 180, 140, 0.9)`;
                    }
                    
                    luciernaga.style.left = startX + 'px';
                    luciernaga.style.top = startY + 'px';
                    luciernaga.style.opacity = '0';
                    
                    document.body.appendChild(luciernaga);
                    
                    const inicio = Date.now();
                    const animar = () => {
                        const elapsed = Date.now() - inicio;
                        const progress = elapsed / duracion;
                        
                        if (progress > 1) {
                            luciernaga.remove();
                            return;
                        }
                        
                        const x = (1-progress)**2 * startX + 2*(1-progress)*progress * midX + progress**2 * endX;
                        const y = (1-progress)**2 * startY + 2*(1-progress)*progress * midY + progress**2 * endY;
                        
                        luciernaga.style.left = x + 'px';
                        luciernaga.style.top = y + 'px';
                        
                        const cicloLocal = elapsed % cicloTiempo;
                        
                        let opacity;
                        if (cicloLocal < tiempoEncendida * 0.3) {
                            opacity = (cicloLocal / (tiempoEncendida * 0.3));
                        } else if (cicloLocal < tiempoEncendida) {
                            opacity = 1;
                        } else if (cicloLocal < tiempoEncendida + 300) {
                            opacity = 1 - ((cicloLocal - tiempoEncendida) / 300);
                        } else {
                            opacity = 0;
                        }
                        
                        luciernaga.style.opacity = opacity * 0.8;
                        requestAnimationFrame(animar);
                    };
                    
                    animar();
                }, i * 300);
            }
            
            setTimeout(crearLuciernagas, 20000);
        }
    </script>
</body>
