<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>STICKERS!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --font: 'Quicksand', 'Nunito', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        }
        
        html, body {
            font-family: var(--font);
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #f5f1ed;
        }

        * {
            font-family: var(--font);
        }

        #pantalla-inicio {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            background: #f5f1ed;
            background-image: url('./images/fondo.png');
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
        }

        .titulo {
            font-size: 48px;
            color: #8b7355;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .controles {
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        .selector {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .selector label {
            font-size: 16px;
            color: #6b5a4a;
            font-weight: 500;
        }

        .opciones-fila {
            display: flex;
            gap: 12px;
        }

        @property --angulo-led {
            syntax: '<angle>';
            inherits: false;
            initial-value: 0deg;
        }

        @keyframes girarLed {
            to { --angulo-led: 360deg; }
        }

        .opcion-btn {
            position: relative;
            padding: 10px 20px;
            font-size: 14px;
            border: none;
            border-radius: 12px;
            background: #5a4a3a;
            color: #f5f1ed;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            transition: transform 0.15s ease;
            box-shadow: none;
            font-family: var(--font-quicksand);
        }

        .opcion-btn::before {
            content: "";
            position: absolute;
            inset: -3px;
            border-radius: 15px;
            background: conic-gradient(
                from var(--angulo-led),
                #f5d97a,
                #e88787,
                #f0a8d0,
                #b79bdb,
                #7ba7e0,
                #a0e0f5,
                #c4e86a,
                #f5d97a
            );
            animation: girarLed 4s linear infinite;
            z-index: -1;
        }

        .opcion-btn::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 12px;
            background: #5a4a3a;
            z-index: -1;
        }

        .opcion-btn:active {
            transform: scale(0.93);
        }

        .opcion-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .opcion-btn.selected {
            background: #d4c5b8;
            color: #fff;
            font-weight: 500;
            animation: rebote 1.2s ease-in-out infinite;
        }

        @keyframes rebote {
            0% {
                transform: translateY(0) scale(1);
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            }
            50% {
                transform: translateY(-8px) scale(1.02);
                box-shadow: 0 12px 20px rgba(0, 0, 0, 0.3);
            }
            100% {
                transform: translateY(0) scale(1);
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            }
        }

        #btn-jugar {
            padding: 12px 36px;
            font-size: 18px;
            background: #f9f5f0;
            color: #6b5a4a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s ease;
            margin-top: 12px;
            font-family: var(--font-quicksand);
            position: relative;
            text-transform: uppercase;
            z-index: 3;
        }

        #btn-jugar {
            position: relative;
            padding: 12px 36px;
            font-size: 18px;
            border: none;
            border-radius: 18px;
            background: #5a4a3a;
            color: #f5f1ed;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            transition: transform 0.15s ease;
            box-shadow: none;
            font-family: var(--font-quicksand);
            margin-top: 12px;
        }

        #btn-jugar::before {
            content: "";
            position: absolute;
            inset: -3px;
            border-radius: 21px;
            background: conic-gradient(
                from var(--angulo-led),
                #f5d97a,
                #e88787,
                #f0a8d0,
                #b79bdb,
                #7ba7e0,
                #a0e0f5,
                #c4e86a,
                #f5d97a
            );
            animation: girarLedRapido 2s linear infinite;
            z-index: -1;
        }

        #btn-jugar::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 18px;
            background: #5a4a3a;
            z-index: -1;
        }

        #btn-jugar:active {
            transform: scale(0.93);
        }

        #btn-jugar:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #btn-inicio, #btn-pausa {
            position: relative;
            padding: 8px 24px;
            font-size: 14px;
            border: none;
            border-radius: 12px;
            background: #5a4a3a;
            color: #f5f1ed;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            transition: transform 0.15s ease;
            box-shadow: none;
            font-family: var(--font-quicksand);
        }

        #btn-inicio::before, #btn-pausa::before {
            content: "";
            position: absolute;
            inset: -3px;
            border-radius: 15px;
            background: conic-gradient(
                from var(--angulo-led),
                #f5d97a,
                #e88787,
                #f0a8d0,
                #b79bdb,
                #7ba7e0,
                #a0e0f5,
                #c4e86a,
                #f5d97a
            );
            animation: girarLed 4s linear infinite;
            z-index: -1;
        }

        #btn-inicio::after, #btn-pausa::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 12px;
            background: #5a4a3a;
            z-index: -1;
        }

        #btn-inicio:active, #btn-pausa:active {
            transform: scale(0.93);
        }

        #pantalla-juego {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            background-image: url('./images/fondo.png');
            background-position: center;
            background-size: cover;
            position: relative;
        }

        .barra-superior {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            gap: 16px;
            background: rgba(245, 241, 237, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212, 197, 184, 0.3);
        }

        .barra-superior button {
            padding: 10px 18px;
            font-size: 13px;
            background: #f9f5f0;
            color: #6b5a4a;
            border: 4px solid #d4c5b8;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.15s ease;
            font-family: var(--font-quicksand);
        }

        .barra-superior button:active {
            opacity: 0.8;
        }

        .espacio-barra { flex: 1; }

        .contenedor-juego {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px 20px 12px 20px;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .cartelito {
            background: #f9f5f0;
            border: 4px solid #d4c5b8;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 22px;
            color: #6b5a4a;
            text-align: center;
            font-weight: 400;
            max-width: 80%;
            margin: 0 auto;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            font-family: var(--font-quicksand);
        }

        .cartelito:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        .grid-contenedor {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 8px;
            position: relative;
        }

        .celda-drop {
            grid-column: 1 / 3;
            grid-row: 4;
            background: transparent;
            border: 2px dashed rgba(212, 197, 184, 0.2);
            border-radius: 6px;
        }

        .item {
            position: absolute;
            width: 140px;
            height: 140px;
            background: transparent;
            border: none;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            z-index: 10;
            padding: 0;
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .item.dragging {
            opacity: 0.85;
            z-index: 100;
        }

        .item.error {
            animation: parpadeo 0.4s ease;
        }

        @keyframes parpadeo {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .countdown {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            color: #8b7355;
            font-weight: bold;
            z-index: 1000;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            font-family: var(--font-quicksand);
        }

        #panel-pausa {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }

        .contenido-pausa {
            background: #f9f5f0;
            border: 4px solid #d4c5b8;
            border-radius: 8px;
            padding: 40px 50px;
            text-align: center;
            min-width: 320px;
            font-family: var(--font-quicksand);
        }

        .contenido-pausa div {
            font-size: 40px;
            color: #6b5a4a;
            font-weight: 400;
            margin-bottom: 30px;
        }

        .contenido-pausa button {
            padding: 12px 32px;
            font-size: 16px;
            background: #f9f5f0;
            color: #6b5a4a;
            border: 4px solid #d4c5b8;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-family: var(--font-quicksand);
        }

        #panel-confirmacion {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }

        .contenido-confirmacion {
            background: #f9f5f0;
            border: 4px solid #d4c5b8;
            border-radius: 8px;
            padding: 40px 50px;
            text-align: center;
            min-width: 320px;
            font-family: var(--font-quicksand);
        }

        .contenido-confirmacion div {
            font-size: 20px;
            color: #6b5a4a;
            font-weight: 500;
            margin-bottom: 30px;
        }

        .contenido-confirmacion button {
            padding: 12px 24px;
            font-size: 16px;
            background: #f9f5f0;
            color: #6b5a4a;
            border: 4px solid #d4c5b8;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-family: var(--font-quicksand);
            margin: 0 10px;
        }

        .contador-contenedor {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 150px;
        }

        .contador-numero {
            font-size: 28px;
            font-weight: 600;
            font-family: var(--font);
            color: #6b5a4a;
            min-width: 55px;
            text-align: center;
        }

        .contador-barra-contenedor {
            width: 80px;
            height: 20px;
            background: #f0e8e0;
            border: 2px solid #d4c5b8;
            border-radius: 10px;
            overflow: hidden;
        }

        .contador-barra {
            height: 100%;
            width: 100%;
            background: #00cc66;
            transition: width 0.3s ease, background-color 0.3s ease;
            border-radius: 8px;
        }

        .contador-barra.amarillo {
            background: #ffd700;
        }

        .contador-barra.rojo {
            background: #ff4444;
        }

        @keyframes flotar-glitter {
            0% {
                opacity: 0.8;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        .glitter {
            animation: flotar-glitter 1.2s ease-out forwards;
        }

        .luciernaga {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="pantalla-inicio">
        <div class="titulo">Stickers!</div>
        <div class="controles">
            <div class="selector">
                <label>Idioma</label>
                <div class="opciones-fila">
                    <button class="opcion-btn" data-idioma="ingles">INGLÉS</button>
                    <button class="opcion-btn" data-idioma="frances">FRANCÉS</button>
                    <button class="opcion-btn" data-idioma="italiano">ITALIANO</button>
                    <button class="opcion-btn" data-idioma="ruso">RUSO</button>
                    <button class="opcion-btn" data-idioma="aleman">ALEMÁN</button>
                    <button class="opcion-btn" data-idioma="chino">CHINO</button>
                    <button class="opcion-btn" data-idioma="portugues">PORTUGUÉS</button>
                    <button class="opcion-btn" data-idioma="holandes">HOLANDÉS</button>
                </div>
            </div>
            <div class="selector">
                <label>Tema</label>
                <div class="opciones-fila">
                    <button class="opcion-btn" data-tema="comida">COMIDA</button>
                    <button class="opcion-btn" data-tema="bano">BAÑO</button>
                    <button class="opcion-btn" data-tema="sentimientos">SENTIMIENTOS</button>
                </div>
            </div>
            <button id="btn-jugar" disabled>¡A JUGAR!</button>
        </div>
    </div>

    <div id="pantalla-juego">
        <div class="barra-superior">
            <button id="btn-inicio">Inicio</button>
            <div class="cartelito" id="cartelito"></div>
            <div class="contador-contenedor">
                <div class="contador-numero" id="contador-numero">2:00</div>
                <div class="contador-barra-contenedor">
                    <div class="contador-barra" id="contador-barra"></div>
                </div>
            </div>
            <button id="btn-pausa">Pausa</button>
        </div>
        <div class="contenedor-juego">
            <div class="grid-contenedor" id="grid">
                <div class="celda-drop" id="zona-drop"></div>
            </div>
        </div>
    </div>

    <div id="panel-pausa">
        <div class="contenido-pausa">
            <div>Pausa</div>
            <button id="btn-reanudar">Continuar</button>
        </div>
    </div>

    <div id="panel-confirmacion">
        <div class="contenido-confirmacion">
            <div>¿Seguro que querés salir?</div>
            <button id="btn-confirmar-si">Sí, salir</button>
            <button id="btn-confirmar-no">Cancelar</button>
        </div>
    </div>

        function countdown() {
            return new Promise(resolve => {
                let n = 3;
                const div = document.createElement('div');
                div.className = 'countdown';
                document.body.appendChild(div);
                
                const timer = setInterval(() => {
                    div.textContent = n;
                    n--;
                    if (n < 0) {
                        clearInterval(timer);
                        div.remove();
                        resolve();
                    }
                }, 1000);
            });
        }

                const y = Math.random() * (gridRect.height - 140);
                div.style.left = x + 'px';
                div.style.top = y + 'px';
                
                div.addEventListener('touchstart', dragStart, false);
                div.addEventListener('touchmove', dragMove, false);
                div.addEventListener('touchend', dragEnd, false);
                
                grid.appendChild(div);
            });
        }

        function proximoItem() {
            const itemsDisponibles = estado.items.filter(item => {
                const element = document.querySelector(`[data-key="${item.key}"]`);
                return element && element.style.display !== 'none';
            });
            
            if (itemsDisponibles.length === 0) {
                cartelito.textContent = '¡Ganaste!';
                cartelito.style.borderColor = '#d4c5b8';
                return;
            }
            
            const random = Math.floor(Math.random() * itemsDisponibles.length);
            estado.itemActual = itemsDisponibles[random];
            cartelito.textContent = estado.itemActual.displayText;
            
            // Cambiar color del borde según género
            const colorPorGenero = {
                masculino: '#4da6ff',  // celeste
                femenino: '#ff69b4',   // rosa
                neutro: '#ffd700',     // amarillo
                plural: '#00cc66'      // verde
            };
            
            cartelito.style.borderColor = colorPorGenero[estado.itemActual.genero] || '#d4c5b8';
        }

        let dragging = null;
        let dragOffset = { x: 0, y: 0 };

        function dragStart(e) {
            if (estado.pausado) return;
            dragging = e.target.closest('.item');
            if (!dragging) return;
            
            dragging.classList.add('dragging');
            const touch = e.touches[0];
            const rect = dragging.getBoundingClientRect();
            dragOffset.x = touch.clientX - rect.left;
            dragOffset.y = touch.clientY - rect.top;
        }

        function dragMove(e) {
            if (!dragging || estado.pausado) return;
            e.preventDefault();
            
            const touch = e.touches[0];
            const gridRect = grid.getBoundingClientRect();
            
            let x = touch.clientX - gridRect.left - dragOffset.x;
            let y = touch.clientY - gridRect.top - dragOffset.y;
            
            x = Math.max(0, Math.min(x, gridRect.width - 140));
            y = Math.max(0, Math.min(y, gridRect.height - 140));
            
            dragging.style.left = x + 'px';
            dragging.style.top = y + 'px';
        }

        function dragEnd(e) {
            if (!dragging) return;
            
            const zonaDrop = document.getElementById('zona-drop');
            const dropRect = zonaDrop.getBoundingClientRect();
            const itemRect = dragging.getBoundingClientRect();
            
            const enZona = !(itemRect.right < dropRect.left || 
                            itemRect.left > dropRect.right || 
                            itemRect.bottom < dropRect.top || 
                            itemRect.top > dropRect.bottom);
            
            if (enZona && dragging.dataset.key === estado.itemActual.key) {
                crearGlitter(itemRect);
                dragging.style.display = 'none';
                estado.puntuacion++;
                proximoItem();
            } else if (enZona) {
                dragging.classList.add('error');
                setTimeout(() => dragging.classList.remove('error'), 400);
            }
            
            dragging.classList.remove('dragging');
            dragging = null;
        }

        function crearGlitter(rect) {
            const cantidad = 12;
            for (let i = 0; i < cantidad; i++) {
                const g = document.createElement('div');
                g.className = 'glitter';
                g.textContent = '•';
                g.style.left = (rect.left + rect.width / 2) + 'px';
                g.style.top = (rect.top + rect.height / 2) + 'px';
                g.style.color = '#d4a574';
                
                const angulo = (i / cantidad) * Math.PI * 2;
                const dist = 80 + Math.random() * 40;
                const tx = Math.cos(angulo) * dist;
                const ty = Math.sin(angulo) * dist;
                
                g.style.setProperty('--tx', tx + 'px');
                g.style.setProperty('--ty', ty + 'px');
                
                document.body.appendChild(g);
                setTimeout(() => g.remove(), 1200);
            }
        }

        function reproducirAudio() {
            if (!estado.itemActual) return;
            
            const utterance = new SpeechSynthesisUtterance(estado.itemActual.palabra);
            
            // Mapear cada idioma a su código lang nativo con acento correcto
            const langMap = {
                'ingles': 'en-GB',        // inglés británico (Queen's English)
                'frances': 'fr-FR',       // francés de Francia
                'italiano': 'it-IT',      // italiano de Italia
                'ruso': 'ru-RU',          // ruso de Rusia
                'aleman': 'de-DE',        // alemán de Alemania
                'chino': 'zh-CN',         // chino mandarín de China
                'portugues': 'pt-PT',     // portugués de Portugal
                'holandes': 'nl-NL'       // holandés de Países Bajos
            };
            
            utterance.lang = langMap[estado.idioma] || 'en-US';
            utterance.rate = 0.8;
            
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        function iniciarContador() {
            const contadorNumero = document.getElementById('contador-numero');
            const contadorBarra = document.getElementById('contador-barra');
            let tiempoRestante = 120; // 2 minutos en segundos
            const tiempoTotal = 120;

            contadorNumero.textContent = formatearTiempo(tiempoRestante);
            contadorBarra.style.width = '100%';
            contadorBarra.className = 'contador-barra';

            contadorInterval = setInterval(() => {
                tiempoRestante--;

                const porcentaje = (tiempoRestante / tiempoTotal) * 100;
                contadorBarra.style.width = porcentaje + '%';

                // Actualizar color según tiempo restante
                if (tiempoRestante <= 30) {
                    contadorBarra.className = 'contador-barra rojo';
                } else if (tiempoRestante <= 60) {
                    contadorBarra.className = 'contador-barra amarillo';
                } else {
                    contadorBarra.className = 'contador-barra';
                }

                contadorNumero.textContent = formatearTiempo(tiempoRestante);

                if (tiempoRestante <= 0) {
                    clearInterval(contadorInterval);
                    gameOver();
                }
            }, 1000);
        }

        function formatearTiempo(segundos) {
            const mins = Math.floor(segundos / 60);
            const segs = segundos % 60;
            return `${mins}:${segs.toString().padStart(2, '0')}`;
        }

                    const cicloTiempo = 7600;
                    const tiempoEncendida = 4000;
                    
                    burbuja.style.width = tamaño + 'px';
                    burbuja.style.height = tamaño + 'px';
                    burbuja.style.borderRadius = '50%';
                    burbuja.style.background = `rgba(255, 255, 255, 0.6)`;
                    burbuja.style.border = `1px solid rgba(255, 255, 255, 0.8)`;
                    burbuja.style.boxShadow = `none`;
                    
                    burbuja.style.left = startX + 'px';
                    burbuja.style.top = startY + 'px';
                    burbuja.style.opacity = '0';
                    
                    document.body.appendChild(burbuja);
                    
                    const inicio = Date.now();
                    const animar = () => {
                        const elapsed = Date.now() - inicio;
                        const progress = elapsed / duracion;
                        
                        if (progress > 1) {
                            burbuja.remove();
                            return;
                        }
                        
                        const x = (1-progress)**2 * startX + 2*(1-progress)*progress * midX + progress**2 * endX;
                        const y = (1-progress)**2 * startY + 2*(1-progress)*progress * midY + progress**2 * endY;
                        
                        burbuja.style.left = x + 'px';
                        burbuja.style.top = y + 'px';
                        
                        const cicloLocal = elapsed % cicloTiempo;
                        
                        let opacity;
                        if (cicloLocal < 800) {
                            // Inspirar (fade in suave en 800ms)
                            opacity = cicloLocal / 800;
                        } else if (cicloLocal < 4800) {
                            // Mantener prendida 4 segundos
                            opacity = 1;
                        } else if (cicloLocal < 5600) {
                            // Expirar (fade out suave en 800ms)
                            opacity = 1 - ((cicloLocal - 4800) / 800);
                        } else {
                            // Apagada 2 segundos
                            opacity = 0;
                        }
                        
                        burbuja.style.opacity = opacity * 0.85;
                        requestAnimationFrame(animar);
                    };
                    
                    animar();
                }, espacioAleatorio);
            }
            
            setTimeout(crearLuciernagas, 40000 + Math.random() * 20000);
        }

        function crearBurbujasOpacas() {
            const grupoSize = 2;
            
            const crearGrupo = () => {
                for (let i = 0; i < grupoSize; i++) {
                    setTimeout(() => {
                        const burbuja = document.createElement('div');
                        burbuja.className = 'luciernaga';
                        
                        const tamaño = 10 + Math.random() * 17.5;
                        
                        const startX = Math.random() * window.innerWidth;
                        const startY = Math.random() * window.innerHeight;
                        
                        const endX = Math.random() * window.innerWidth;
                        const endY = Math.random() * window.innerHeight;
                        
                        const midX = (startX + endX) / 2 + (Math.random() - 0.5) * 100;
                        const midY = (startY + endY) / 2 + (Math.random() - 0.5) * 100;
                        
                        const duracion = 16000 + Math.random() * 10000;
                        
                        burbuja.style.width = tamaño + 'px';
                        burbuja.style.height = tamaño + 'px';
                        burbuja.style.borderRadius = '50%';
                        burbuja.style.background = `rgba(255, 255, 255, 1)`;
                        burbuja.style.border = `0.5px solid rgba(255, 255, 255, 1)`;
                        burbuja.style.boxShadow = `none`;
                        
                        burbuja.style.left = startX + 'px';
                        burbuja.style.top = startY + 'px';
                        burbuja.style.opacity = '0';
                        
                        document.body.appendChild(burbuja);
                        
                        const inicio = Date.now();
                        const animar = () => {
                            const elapsed = Date.now() - inicio;
                            const progress = elapsed / duracion;
                            
                            if (progress > 1) {
                                burbuja.remove();
                                return;
                            }
                            
                            const x = (1-progress)**2 * startX + 2*(1-progress)*progress * midX + progress**2 * endX;
                            const y = (1-progress)**2 * startY + 2*(1-progress)*progress * midY + progress**2 * endY;
                            
                            burbuja.style.left = x + 'px';
                            burbuja.style.top = y + 'px';
                            
                            const cicloTiempo = 7600;
                            const cicloLocal = elapsed % cicloTiempo;
                            
                            let opacity;
                            if (cicloLocal < 800) {
                                opacity = cicloLocal / 800;
                            } else if (cicloLocal < 4800) {
                                opacity = 1;
                            } else if (cicloLocal < 5600) {
                                opacity = 1 - ((cicloLocal - 4800) / 800);
                            } else {
                                opacity = 0;
                            }
                            
                            // Cuando termina el ciclo total, desvanecerse suave
                            const fadeOutDuration = 1200;
                            const timeUntilEnd = duracion - elapsed;
                            if (timeUntilEnd < fadeOutDuration) {
                                opacity = (timeUntilEnd / fadeOutDuration) * opacity;
                            }
                            
                            burbuja.style.opacity = opacity * 1;
                            requestAnimationFrame(animar);
                        };
                        
                        animar();
                    }, i * 150);
                }
            };
            
            crearGrupo();
            setInterval(crearGrupo, 3000);
        }
    </script>
