<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STICKERS! - Juego de Idiomas</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @property --angulo-led {
            syntax: '<angle>';
            inherits: false;
            initial-value: 0deg;
        }

        @-webkit-keyframes girarLed {
            to { --angulo-led: 360deg; }
        }

        @keyframes girarLed {
            to { --angulo-led: 360deg; }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* PANTALLA DE INICIO */
        #pantalla-inicio {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background-image: url('./images/fondo.png');
            background-position: center;
            background-size: cover;
        }

        .contenedor-inicio {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .titulo-inicio {
            font-size: 48px;
            font-weight: 700;
            text-align: center;
            color: #2b2b2b;
        }

        .botones-inicio {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .botones-inicio button {
            position: relative;
            padding: 15px 40px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            background: #2b2b2b;
            color: #e8e6de;
            text-transform: uppercase;
            transition: transform 0.15s ease;
        }

        .botones-inicio button::before {
            content: "";
            position: absolute;
            inset: -6px;
            border-radius: 11px;
            background: conic-gradient(
                from var(--angulo-led),
                #f5d97a,
                #e88787,
                #f0a8d0,
                #b79bdb,
                #7ba7e0,
                #a0e0f5,
                #c4e86a,
                #f5d97a
            );
            -webkit-background: linear-gradient(45deg, #f5d97a, #e88787, #f0a8d0, #b79bdb, #7ba7e0, #a0e0f5, #c4e86a);
            animation: girarLed 4s linear infinite;
            -webkit-animation: girarLed 4s linear infinite;
            z-index: -1;
        }

        .botones-inicio button::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 8px;
            background: #2b2b2b;
            z-index: -1;
        }

        .botones-inicio button:active {
            transform: scale(0.93);
        }

        /* MODOS PARA BOTÓN JUGAR */
        .botones-inicio button.apagado {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .botones-inicio button.apagado::before {
            animation: none;
            background: #666;
        }

        .botones-inicio button.encendido {
            opacity: 1;
            cursor: pointer;
        }

        .botones-inicio button.encendido::before {
            animation: girarLed 4s linear infinite;
            background: conic-gradient(
                from var(--angulo-led),
                #f5d97a,
                #e88787,
                #f0a8d0,
                #b79bdb,
                #7ba7e0,
                #a0e0f5,
                #c4e86a,
                #f5d97a
            );
        }

        /* SELECTOR DE OPCIONES */
        .grupo-botones {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
        }

        .grupo-botones button {
            position: relative;
            padding: 12px 24px;
            font-size: 13px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            background: #2b2b2b;
            color: #e8e6de;
            text-transform: uppercase;
            transition: transform 0.15s ease;
        }

        .grupo-botones button::before {
            content: "";
            position: absolute;
            inset: -5px;
            border-radius: 8px;
            background: conic-gradient(
                from var(--angulo-led),
                #f5d97a,
                #e88787,
                #f0a8d0,
                #b79bdb,
                #7ba7e0,
                #a0e0f5,
                #c4e86a,
                #f5d97a
            );
            -webkit-background: linear-gradient(45deg, #f5d97a, #e88787, #f0a8d0, #b79bdb, #7ba7e0, #a0e0f5, #c4e86a);
            animation: girarLed 4s linear infinite;
            -webkit-animation: girarLed 4s linear infinite;
            z-index: -1;
        }

        .grupo-botones button::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 6px;
            background: #2b2b2b;
            z-index: -1;
        }

        .grupo-botones button:active {
            transform: scale(0.93);
        }

        /* MODOS DE BOTONES */
        .grupo-botones button.apagado {
            opacity: 0.4;
        }

        .grupo-botones button.apagado::before {
            animation: none;
            background: #666;
        }

        .grupo-botones button.encendido {
            opacity: 1;
        }

        .grupo-botones button.encendido::before {
            animation: girarLed 4s linear infinite;
            background: conic-gradient(
                from var(--angulo-led),
                #f5d97a,
                #e88787,
                #f0a8d0,
                #b79bdb,
                #7ba7e0,
                #a0e0f5,
                #c4e86a,
                #f5d97a
            );
        }

        .separador-grupos {
            height: 20px;
        }

        /* PANTALLA DE JUEGO */
        #pantalla-juego {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            position: relative;
            background-image: url('./images/fondo.png');
            background-position: center;
            background-size: cover;
        }

        /* BARRA SUPERIOR - Botones y controles */
        .barra-superior {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            gap: 16px;
            height: auto;
            border-bottom: 1px solid #ccc;
        }

        .barra-superior button {
            position: relative;
            padding: 10px 18px;
            font-size: 13px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            background: #2b2b2b;
            color: #e8e6de;
            text-transform: uppercase;
            transition: transform 0.15s ease;
        }

        .barra-superior button::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 8px;
            background: conic-gradient(
                from var(--angulo-led),
                #f5d97a,
                #e88787,
                #f0a8d0,
                #b79bdb,
                #7ba7e0,
                #a0e0f5,
                #c4e86a,
                #f5d97a
            );
            animation: girarLed 4s linear infinite;
            z-index: -1;
        }

        .barra-superior button::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 6px;
            background: #2b2b2b;
            z-index: -1;
        }

        .barra-superior button:active {
            transform: scale(0.93);
        }

        #btn-tiempo {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            position: relative;
            min-width: 120px;
        }

        .tiempo-display {
            font-size: 14px;
            font-weight: 600;
            min-width: 45px;
        }

        .barra-tiempo {
            width: 60px;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #999;
        }

        .barra-tiempo-relleno {
            height: 100%;
            background: #4CAF50;
            width: 100%;
            transition: width 0.1s linear;
        }

        .tarjeta-palabra {
            border: 2px solid #999;
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 14px;
            text-align: center;
            font-weight: 500;
            background: #fff;
            min-width: 120px;
        }

        .espacio-barra {
            flex: 1;
        }

        /* CONTENEDOR PRINCIPAL DE JUEGO */
        .contenedor-juego {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px 20px 12px 20px;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        /* GRID DE ITEMS - Zona de spawns */
        .grid-contenedor {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 8px;
            position: relative;
            border: 1px solid #ddd;
        }

        /* CELDA DROP - Zona de entrega */
        .celda-drop {
            grid-column: 1 / 3;
            grid-row: 4;
            background: transparent;
            border: 2px dashed #999;
            border-radius: 6px;
        }

        /* ITEM - Elementos arrastrables */
        .item {
            position: absolute;
            width: 140px;
            height: 140px;
            background: #f0f0f0;
            border: 1px solid #999;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            z-index: 10;
            border-radius: 4px;
            font-size: 12px;
            text-align: center;
            padding: 4px;
            text-transform: uppercase;
        }

        .item:active {
            cursor: grabbing;
            opacity: 0.7;
            z-index: 100;
        }

        .item.mandarin {
            text-transform: none;
        }

        /* MODAL DE CONFIRMACIÓN */
        #modal-confirmacion {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-contenido {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            min-width: 300px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .modal-contenido h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #2b2b2b;
        }

        .modal-botones {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-botones button {
            position: relative;
            padding: 10px 24px;
            font-size: 13px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            background: #2b2b2b;
            color: #e8e6de;
            text-transform: uppercase;
            transition: transform 0.15s ease;
        }

        .modal-botones button::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 8px;
            background: conic-gradient(
                from var(--angulo-led),
                #f5d97a,
                #e88787,
                #f0a8d0,
                #b79bdb,
                #7ba7e0,
                #a0e0f5,
                #c4e86a,
                #f5d97a
            );
            animation: girarLed 4s linear infinite;
            z-index: -1;
        }

        .modal-botones button::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 6px;
            background: #2b2b2b;
            z-index: -1;
        }

        .modal-botones button:active {
            transform: scale(0.93);
        }

        /* MENSAJE DE RONDA COMPLETADA */
        .mensaje-ronda {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #2b2b2b;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            z-index: 2000;
            display: none;
        }
    </style>
</head>

            </div>

        let estadoGlobal = {

        // ========================================
        // NAVEGACIÓN ENTRE PANTALLAS
        // ========================================
        function mostrarPantallaInicio() {
            document.getElementById('pantalla-inicio').style.display = 'flex';
            document.getElementById('pantalla-juego').style.display = 'none';
            document.getElementById('modal-confirmacion').style.display = 'none';
        }

        function mostrarPantallaJuego() {
            document.getElementById('pantalla-inicio').style.display = 'none';
            document.getElementById('pantalla-juego').style.display = 'flex';
            document.getElementById('modal-confirmacion').style.display = 'none';
            inicializarJuego();
        }

        function mostrarModal() {
            document.getElementById('modal-confirmacion').style.display = 'flex';
        }

        function ocultarModal() {
            document.getElementById('modal-confirmacion').style.display = 'none';
        }

        // ========================================
        // SISTEMA DE OPCIONES (IDIOMAS Y TEMAS)
        // ========================================
        function configurarGrupo(grupoId, tipoSeleccion) {
            const grupo = document.getElementById(grupoId);
            grupo.querySelectorAll('.btn-opcion').forEach(boton => {
                boton.addEventListener('click', function() {
                    // Apagar todos del grupo
                    grupo.querySelectorAll('.btn-opcion').forEach(btn => {
                        btn.classList.add('apagado');
                        btn.classList.remove('encendido');
                    });
                    
                    // Encender solo el clickeado
                    this.classList.remove('apagado');
                    this.classList.add('encendido');

                    // Guardar selección
                    if (tipoSeleccion === 'idioma') {
                        estadoGlobal.idiomaSeleccionado = this.dataset.idioma;
                    } else if (tipoSeleccion === 'tema') {
                        estadoGlobal.temaSeleccionado = this.dataset.tema;
                    }

                    // Validar y actualizar JUGAR
                    validarYActualizarJugar();
                });
            });
        }

        function validarYActualizarJugar() {
            const btnJugar = document.getElementById('btn-jugar');
            if (estadoGlobal.idiomaSeleccionado && estadoGlobal.temaSeleccionado) {
                btnJugar.classList.remove('apagado');
                btnJugar.classList.add('encendido');
            } else {
                btnJugar.classList.add('apagado');
                btnJugar.classList.remove('encendido');
            }
        }

        // ========================================
        // JUEGO - Inicialización
        // ========================================
        function inicializarJuego() {
            console.log('Juego iniciado con:');
            console.log('Idioma:', estadoGlobal.idiomaSeleccionado);
            console.log('Tema:', estadoGlobal.temaSeleccionado);
            
            // Obtener items del vocab
            const itemsDisponibles = vocab[estadoGlobal.temaSeleccionado][estadoGlobal.idiomaSeleccionado];
            
            // Seleccionar 5 al azar
            const itemsAleatorios = [];
            const indexUsados = new Set();
            
            while (itemsAleatorios.length < 5) {
                const index = Math.floor(Math.random() * itemsDisponibles.length);
                if (!indexUsados.has(index)) {
                    indexUsados.add(index);
                    itemsAleatorios.push(itemsDisponibles[index]);
                }
            }
            
            estadoGlobal.itemsActuales = itemsAleatorios;
            estadoGlobal.itemsCompletados = [];
            
            // Mostrar palabra en español (primera de la lista)
            const palabraSpanish = itemsAleatorios[0].key.replace(/_/g, ' ');
            document.getElementById('tarjeta-palabra').textContent = palabraSpanish.toUpperCase();
            
            // Limpiar grid
            const grid = document.getElementById('grid');
            const itemsExistentes = grid.querySelectorAll('.item');
            itemsExistentes.forEach(item => item.remove());
            
            // Posicionar items al azar en el grid
            posicionarItems(itemsAleatorios);
            
            console.log('Items cargados:', itemsAleatorios);
        }

        // ========================================
        // POSICIONAR ITEMS EN EL GRID
        // ========================================
        function posicionarItems(items) {
            const grid = document.getElementById('grid');
            const gridRect = grid.getBoundingClientRect();
            const zonaDropRect = document.getElementById('zona-drop').getBoundingClientRect();
            
            items.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'item';
                itemDiv.textContent = item.palabra;
                itemDiv.dataset.key = item.key;
                itemDiv.draggable = true;
                
                // Posición aleatoria en el grid (evitando zona drop)
                let top, left, posicionValida;
                do {
                    posicionValida = true;
                    top = Math.random() * (gridRect.height - 150);
                    left = Math.random() * (gridRect.width - 150);
                    
                    // Evitar zona drop
                    if (left < 250 && top > gridRect.height - 200) {
                        posicionValida = false;
                    }
                } while (!posicionValida);
                
                itemDiv.style.top = top + 'px';
                itemDiv.style.left = left + 'px';
                
                // Touch events para móvil
                itemDiv.addEventListener('touchstart', touchStart);
                itemDiv.addEventListener('touchmove', touchMove);
                itemDiv.addEventListener('touchend', touchEnd);
                
                grid.appendChild(itemDiv);
            });
            
            // Zona drop (sin eventos, se maneja en touchEnd)
            const zonaDrop = document.getElementById('zona-drop');
            // Touch events manejados en touchEnd
        }

        // ========================================
        // TOUCH & DROP EVENTS (Móvil)
        // ========================================
        let touchItem = null;
        let touchOffsetX = 0;
        let touchOffsetY = 0;
        
        function touchStart(e) {
            touchItem = this;
            const touch = e.touches[0];
            const rect = this.getBoundingClientRect();
            
            touchOffsetX = touch.clientX - rect.left;
            touchOffsetY = touch.clientY - rect.top;
            
            this.style.opacity = '0.7';
            this.style.zIndex = '100';
        }
        
        function touchMove(e) {
            if (!touchItem) return;
            e.preventDefault();
            
            const touch = e.touches[0];
            const grid = document.getElementById('grid');
            const gridRect = grid.getBoundingClientRect();
            
            let newX = touch.clientX - gridRect.left - touchOffsetX;
            let newY = touch.clientY - gridRect.top - touchOffsetY;
            
            // Limitar al grid
            newX = Math.max(0, Math.min(newX, gridRect.width - 140));
            newY = Math.max(0, Math.min(newY, gridRect.height - 140));
            
            touchItem.style.left = newX + 'px';
            touchItem.style.top = newY + 'px';
        }
        
        function touchEnd(e) {
            if (!touchItem) return;
            
            const touch = e.changedTouches[0];
            const zonaDrop = document.getElementById('zona-drop');
            const zoneRect = zonaDrop.getBoundingClientRect();
            
            // Verificar si está dentro de la zona drop
            if (touch.clientX >= zoneRect.left && 
                touch.clientX <= zoneRect.right &&
                touch.clientY >= zoneRect.top && 
                touch.clientY <= zoneRect.bottom) {
                
                // Está en la zona drop
                const palabraObjetivo = estadoGlobal.itemsActuales[0].key;
                const palabraArrastrada = touchItem.dataset.key;
                
                if (palabraArrastrada === palabraObjetivo) {
                    // Correcto!
                    console.log('✅ Correcto!');
                    touchItem.remove();
                    
                    // Agregar a completados
                    estadoGlobal.itemsCompletados.push(palabraArrastrada);
                    
                    // Verificar si completó todos
                    if (estadoGlobal.itemsCompletados.length === estadoGlobal.itemsActuales.length) {
                        mostrarRondaCompletada();
                    } else {
                        // Siguiente palabra
                        const proximaPalabra = estadoGlobal.itemsActuales[estadoGlobal.itemsCompletados.length].key.replace(/_/g, ' ');
                        document.getElementById('tarjeta-palabra').textContent = proximaPalabra.toUpperCase();
                    }
                } else {
                    // Incorrecto - rebota
                    console.log('❌ Incorrecto');
                    touchItem.style.backgroundColor = '#ffcccc';
                    setTimeout(() => {
                        touchItem.style.backgroundColor = '#f0f0f0';
                    }, 500);
                }
            }
            
            touchItem.style.opacity = '1';
            touchItem.style.zIndex = '10';
            touchItem = null;
        }

        // ========================================
        // RONDA COMPLETADA
        // ========================================
        function mostrarRondaCompletada() {
            const mensaje = document.getElementById('mensaje-ronda');
            mensaje.style.display = 'block';
            
            setTimeout(() => {
                mensaje.style.display = 'none';
                mostrarPantallaInicio();
            }, 2000);
        }

        // ========================================
        // EVENTOS
        // ========================================
        document.getElementById('btn-jugar').addEventListener('click', function() {
            if (this.classList.contains('encendido')) {
                mostrarPantallaJuego();
            }
        });

        document.getElementById('btn-inicio').addEventListener('click', mostrarModal);
        document.getElementById('btn-confirmar').addEventListener('click', mostrarPantallaInicio);
        document.getElementById('btn-cancelar').addEventListener('click', ocultarModal);

        // ========================================
        // INICIALIZACIÓN AL CARGAR
        // ========================================
        configurarGrupo('grupo-idiomas', 'idioma');
        configurarGrupo('grupo-temas', 'tema');
        mostrarPantallaInicio();

        console.log('✅ App inicializada');
    </script>
